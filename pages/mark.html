<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Z-MARK - Stock Marketing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.1/jspdf.plugin.autotable.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
  <link href="../assets/css/mark.css" rel="stylesheet" />
  <link href="../assets/css/system-expiry.css" rel="stylesheet" />
</head>
<body>
  <div class="z-loading" id="loading-screen">
    <div class="z-spinner"></div>
    <strong>Memuat Z-MARK</strong>
    <span>Validasi akses marketing...</span>
  </div>

  <main class="z-app" id="main-content" hidden>
    <aside class="z-sidebar" id="sidebar">
      <div class="z-brand">
        <div class="z-logo">Z</div>
        <div>
          <strong>ZEPPELIN</strong>
          <span>WE CREATE SOLUTIONS</span>
        </div>
      </div>

      <nav class="z-nav">
        <button type="button" class="z-nav-item" data-nav="dashboard"><i class="fa-solid fa-gauge-high"></i> Dashboard</button>
        <p>Stock Marketing</p>
        <button type="button" class="z-nav-item active" data-view="items"><i class="fa-solid fa-cube"></i> Z-MARK</button>
        <button type="button" class="z-nav-item" data-view="kategori"><i class="fa-solid fa-layer-group"></i> Kategori</button>
        <button type="button" class="z-nav-item" data-view="lokasi"><i class="fa-solid fa-location-dot"></i> Lokasi</button>
        <button type="button" class="z-nav-item" data-view="supplier"><i class="fa-solid fa-truck-fast"></i> Supplier</button>
        <button type="button" class="z-nav-item" data-view="brand"><i class="fa-solid fa-tags"></i> Brand</button>
        <button type="button" class="z-nav-item" data-view="satuan"><i class="fa-solid fa-ruler-combined"></i> Satuan</button>
        <button type="button" class="z-nav-item" data-view="rak"><i class="fa-solid fa-table-cells"></i> Rak</button>
        <p>Transaksi</p>
        <button type="button" class="z-nav-item" data-view="penerimaan"><i class="fa-solid fa-square-plus"></i> Penerimaan</button>
        <button type="button" class="z-nav-item" data-view="pengeluaran"><i class="fa-solid fa-square-minus"></i> Pengeluaran</button>
        <button type="button" class="z-nav-item" data-view="mutasi"><i class="fa-solid fa-rotate"></i> Mutasi</button>
        <p>Laporan</p>
        <button type="button" class="z-nav-item" data-report="stock"><i class="fa-regular fa-file-lines"></i> Laporan Stok</button>
        <button type="button" class="z-nav-item" data-report="items"><i class="fa-regular fa-file-excel"></i> Laporan Barang</button>
        <button type="button" class="z-nav-item" data-report="mutasi"><i class="fa-regular fa-paste"></i> Laporan Mutasi</button>
      </nav>
      <div class="z-footer">© 2026 Zeppelin</div>
    </aside>

    <section class="z-main">
      <header class="z-topbar">
        <div class="z-crumb">
          <button type="button" class="z-icon-btn" id="toggleSidebar" aria-label="Toggle menu"><i class="fa-solid fa-bars"></i></button>
          <span><i class="fa-solid fa-chevron-right"></i> Z-MARK</span>
        </div>
        <div class="z-user">
          <button type="button" class="z-bell" id="btnLowStock" title="Lihat stok rendah"><i class="fa-regular fa-bell"></i><b id="notifCount">0</b></button>
          <div class="z-user-info"><strong id="userName">Admin Zmark</strong><span id="userDept">Marketing</span></div>
          <button type="button" class="z-icon-btn" id="backDashboard" title="Kembali dashboard"><i class="fa-solid fa-chevron-down"></i></button>
        </div>
      </header>

      <div class="z-content">
        <section class="z-title-row">
          <div>
            <h1>Z-MARK</h1>
            <p>Stock Marketing / Gudang Marketing</p>
          </div>
          <div class="z-actions">
            <div class="z-dropdown-wrap">
              <button type="button" class="z-btn z-btn-light" id="btnFilter"><i class="fa-solid fa-filter"></i> Filter <i class="fa-solid fa-chevron-down"></i></button>
              <div class="z-menu" id="filterMenu">
                <button type="button" data-quick="low">Stok Rendah</button>
                <button type="button" data-quick="empty">Tidak Ada Stok</button>
                <button type="button" data-quick="available">Tersedia</button>
                <button type="button" data-quick="all">Semua Barang</button>
              </div>
            </div>
            <div class="z-dropdown-wrap">
              <button type="button" class="z-btn z-btn-outline" id="btnExport"><i class="fa-regular fa-file-lines"></i> Export <i class="fa-solid fa-chevron-down"></i></button>
              <div class="z-menu" id="exportMenu">
                <button type="button" data-export="excel"><i class="fa-solid fa-file-excel"></i> Export Excel</button>
                <button type="button" data-export="pdf"><i class="fa-solid fa-file-pdf"></i> Export PDF</button>
                <button type="button" data-export="csv"><i class="fa-solid fa-file-csv"></i> Export CSV</button>
              </div>
            </div>
            <button type="button" class="z-btn z-btn-primary" id="btnAdd"><i class="fa-solid fa-plus"></i> Tambah Barang</button>
          </div>
        </section>

        <section class="z-stats" id="statsGrid"></section>

        <section class="z-panel">
          <div class="z-filterbar">
            <div class="z-search"><input id="searchInput" type="search" placeholder="Cari nama barang, kode, barcode..." /><i class="fa-solid fa-magnifying-glass"></i></div>
            <select id="filterCategory"><option value="all">Semua Kategori</option></select>
            <select id="filterLocation"><option value="all">Semua Lokasi</option></select>
            <select id="filterStatus"><option value="all">Semua Status</option><option value="available">Tersedia</option><option value="low">Stok Rendah</option><option value="empty">Habis</option></select>
            <button type="button" class="z-btn z-btn-reset" id="btnReset">Reset</button>
          </div>

          <div class="z-view-head" id="viewHead"></div>
          <div class="z-table-wrap">
            <table class="z-table" id="dataTable"></table>
          </div>
          <div class="z-table-foot">
            <label>Tampilkan <select id="pageSize"><option>10</option><option>25</option><option>50</option><option>100</option></select> data</label>
            <div class="z-pagination" id="pagination"></div>
          </div>
        </section>
      </div>
    </section>
  </main>

  <div class="z-modal" id="itemModal" aria-hidden="true">
    <div class="z-modal-card">
      <div class="z-modal-head"><h3 id="itemModalTitle">Tambah Barang</h3><button type="button" class="z-close" data-close><i class="fa-solid fa-xmark"></i></button></div>
      <form id="itemForm" class="z-form">
        <input type="hidden" id="itemId" />
        <label>Nama Barang<input id="itemName" required placeholder="Contoh: Pulpen Ballpoint Hitam" /></label>
        <div class="z-form-grid">
          <label>Kode Barang<input id="itemSku" required placeholder="BRG-0001" /></label>
          <label>Barcode<input id="itemBarcode" placeholder="Opsional" /></label>
        </div>
        <div class="z-form-grid">
          <label>Kategori<input id="itemCat" required placeholder="ATK" /></label>
          <label>Lokasi/Rak<input id="itemLoc" required placeholder="Rak A1" /></label>
        </div>
        <div class="z-form-grid">
          <label>Stok<input id="itemStock" type="number" min="0" required /></label>
          <label>Satuan<input id="itemUnit" required placeholder="Pcs" /></label>
        </div>
        <div class="z-form-grid">
          <label>Supplier<input id="itemSupplier" placeholder="Nama supplier" /></label>
          <label>Brand<input id="itemBrand" placeholder="Nama brand" /></label>
        </div>
        <label>Catatan<textarea id="itemNote" rows="3" placeholder="Catatan opsional"></textarea></label>
        <div class="z-modal-actions"><button type="button" class="z-btn z-btn-light" data-close>Batal</button><button type="submit" class="z-btn z-btn-primary">Simpan</button></div>
      </form>
    </div>
  </div>

  <div class="z-modal" id="viewModal" aria-hidden="true">
    <div class="z-modal-card small">
      <div class="z-modal-head"><h3>Detail Barang</h3><button type="button" class="z-close" data-close><i class="fa-solid fa-xmark"></i></button></div>
      <div id="viewDetail" class="z-detail"></div>
      <div class="z-modal-actions"><button type="button" class="z-btn z-btn-outline" id="btnDetailOut">Pengeluaran</button><button type="button" class="z-btn z-btn-primary" id="btnDetailIn">Penerimaan</button></div>
    </div>
  </div>

  <div class="z-modal" id="trxModal" aria-hidden="true">
    <div class="z-modal-card small">
      <div class="z-modal-head"><h3 id="trxTitle">Update Stok</h3><button type="button" class="z-close" data-close><i class="fa-solid fa-xmark"></i></button></div>
      <form id="trxForm" class="z-form">
        <input type="hidden" id="trxItemId" />
        <input type="hidden" id="trxType" />
        <div class="z-alert" id="trxInfo"></div>
        <div class="z-form-grid">
          <label>Jumlah<input id="trxQty" type="number" min="1" required /></label>
          <label>Satuan<input id="trxUnit" required /></label>
        </div>
        <label>Catatan<textarea id="trxNote" rows="3" required placeholder="Contoh: Restock vendor / Dipakai event"></textarea></label>
        <div class="z-modal-actions"><button type="button" class="z-btn z-btn-light" data-close>Batal</button><button type="submit" class="z-btn z-btn-primary">Konfirmasi</button></div>
      </form>
    </div>
  </div>

  <div class="z-toast" id="toast"></div>
  <script src="../assets/js/mark.js" type="module"></script>
  <script defer src="../assets/js/system-expiry.js"></script>
</body>
</html>
