<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1" name="viewport"/>
<title>Zeppelin — User Dashboard</title>
<link href="../assets/img/icov2.png" rel="icon" type="image/png"/>

<link href="../assets/css/user.css" rel="stylesheet"/>
<style>
.system-expiry-banner{
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    background: linear-gradient(90deg,#7f1d1d,#991b1b,#dc2626);
    color: white;
    z-index: 999999;
    padding: 12px 20px;
    text-align: center;
    font-family: Arial, sans-serif;
    font-size: 14px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.35);
    animation: pulseBanner 2s infinite;
}
.system-expiry-banner strong{
    font-size: 15px;
}
body{
    padding-top: 70px !important;
}
.system-locked-overlay{
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.96);
    z-index: 99999999;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
}
.system-locked-box{
    max-width: 700px;
    width: 100%;
    background: #111827;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 18px;
    padding: 40px;
    text-align: center;
    color: white;
    box-shadow: 0 0 40px rgba(0,0,0,0.5);
    font-family: Arial, sans-serif;
}
.system-locked-box h1{
    font-size: 34px;
    margin-bottom: 15px;
    color: #ef4444;
}
.system-locked-box p{
    color: #d1d5db;
    line-height: 1.7;
    margin-bottom: 12px;
}
.system-locked-box .wa-contact{
    display: inline-block;
    margin-top: 15px;
    background: #22c55e;
    color: white;
    padding: 14px 24px;
    border-radius: 10px;
    text-decoration: none;
    font-weight: bold;
    font-size: 16px;
}
@keyframes pulseBanner {
    0% { opacity: 1; }
    50% { opacity: 0.82; }
    100% { opacity: 1; }
}
</style>

</head>
<body data-theme="light">
<div class="loading-screen" id="loading-screen">
<div class="spinner"></div>
<p>Memvalidasi Sesi Anda...</p>
</div>
<svg height="0" style="position:absolute" width="0">
<defs>
<svg fill="none" height="24" id="icon-grid" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><rect height="7" width="7" x="3" y="3"></rect><rect height="7" width="7" x="14" y="3"></rect><rect height="7" width="7" x="14" y="14"></rect><rect height="7" width="7" x="3" y="14"></rect></svg>
<svg fill="none" height="24" id="icon-plus" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><line x1="12" x2="12" y1="5" y2="19"></line><line x1="5" x2="19" y1="12" y2="12"></line></svg>
<svg fill="none" height="24" id="icon-logout" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" x2="9" y1="12" y2="12"></line></svg>
<svg fill="none" height="24" id="icon-open" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22 6 12 13 2 6"></polyline></svg>
<svg fill="none" height="24" id="icon-progress" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M21 12a9 9 0 1 1-6.219-8.56"></path></svg>
<svg fill="none" height="24" id="icon-closed" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
</defs>
</svg>
<div class="app app-content" id="app-content">
<header class="app-header">
<div class="logo">ZP</div>
<div class="title"><div class="name">Zeppelin</div><div class="tag">User Dashboard (IT Support)</div></div>
<div class="controls">
<div class="small" id="userInfo" style="text-align: right;">
        Selamat datang,<br/>
<strong id="userNameDisplay"></strong>
</div>
<a class="btn ghost" href="dashboard.html" id="dashboardBtn" title="Dashboard Utama">
<svg><use href="#icon-grid"></use></svg>
</a>
<button class="btn ghost" id="logoutBtn" title="Logout">
<svg><use href="#icon-logout"></use></svg>
</button>
<button class="btn" id="newReportBtn">
<svg><use href="#icon-plus"></use></svg>
        Buat Laporan Baru
      </button>
</div>
</header>
<main id="mainContent">
<h3>Ringkasan Laporan</h3>
<div class="summary-grid">
<div class="card summary-card" id="summary-open">
<div class="icon"><svg><use href="#icon-open"></use></svg></div>
<div class="info">
<div class="small">Open</div>
<div class="count" id="openCount">0</div>
</div>
</div>
<div class="card summary-card" id="summary-progress">
<div class="icon"><svg><use href="#icon-progress"></use></svg></div>
<div class="info">
<div class="small">In Progress</div>
<div class="count" id="progressCount">0</div>
</div>
</div>
<div class="card summary-card" id="summary-closed">
<div class="icon"><svg><use href="#icon-closed"></use></svg></div>
<div class="info">
<div class="small">Closed</div>
<div class="count" id="closedCount">0</div>
</div>
</div>
</div>
<h3 class="section-title" style="margin-top: 24px;">Semua Laporan Saya</h3>
<div class="card" style="margin-top: 12px; padding: 12px;"> <div class="table-wrap">
<table aria-describedby="Daftar laporan saya" id="reportTable">
<thead>
<tr>
<th>ID Laporan</th>
<th>Jenis Masalah</th>
<th>Deskripsi</th>
<th>PIC</th> <th>Status</th>
<th>Dibuat</th>
<th>Aksi</th> </tr>
</thead>
<tbody>
</tbody>
</table>
</div>
</div>
</main>
<footer class="small">Zeppelin IT Support — <span id="footerDate"></span></footer>
</div>
<div class="modal-backdrop" id="modalBackdrop">
<div aria-modal="true" class="modal" role="dialog">
<h3 id="modalTitle">Buat Laporan Baru</h3>
<form id="modalForm" onsubmit="return false;">
<div>
<label class="small">Nama Pelapor</label>
<input id="m_nama" readonly="" required=""/> </div>
<div style="margin-top:10px">
<label class="small">Jenis Masalah</label>
<select id="m_jenis" required="">
<option value="">Pilih…</option>
<option>Jaringan</option>
<option>Hardware</option>
<option>Software</option>
<option>Login / Akun</option>
<option>Lainnya</option>
</select>
</div>
<div style="margin-top:10px">
<label class="small">Deskripsi Masalah</label>
<textarea id="m_catatan" placeholder="Jelaskan masalah Anda di sini..." required=""></textarea>
</div>
<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:12px">
<button class="btn" id="modalSave">Kirim Laporan</button>
<button class="btn ghost" id="modalCancel" type="button">Batal</button>
</div>
</form>
</div>
</div>
<script src="../assets/js/user.js" type="module"></script>

<script>
(function(){
    const expiryDate = new Date("2026-06-07T00:00:00+07:00");
    const now = new Date();

    const banner = document.createElement("div");
    banner.className = "system-expiry-banner";
    banner.innerHTML = `
        <strong>⚠ NOTICE SYSTEM</strong><br>
        Masa aktif sistem / web ini akan berakhir pada <strong>6 Juni 2026</strong>.
        Setelah tanggal tersebut sistem akan dikunci otomatis.
        Hubungi <strong>082191847167</strong> untuk informasi lebih lanjut.
    `;
    document.body.appendChild(banner);

    if(now >= expiryDate){
        document.body.innerHTML = `
            <div class="system-locked-overlay">
                <div class="system-locked-box">
                    <h1>SYSTEM LOCKED</h1>
                    <p>
                        Masa aktif sistem telah berakhir pada <strong>6 Juni 2026</strong>.
                    </p>
                    <p>
                        Akses ke sistem ini telah dinonaktifkan secara otomatis.
                    </p>
                    <p>
                        Silakan hubungi administrator untuk perpanjangan layanan atau informasi lebih lanjut.
                    </p>
                    <a class="wa-contact" href="https://wa.me/6282191847167" target="_blank">
                        Hubungi WhatsApp Administrator
                    </a>
                </div>
            </div>
        `;
        document.body.style.overflow = "hidden";
    }
})();
</script>

</body>
</html>
