<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>Login Access - Zeppelin</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&amp;family=Montserrat:wght@700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet"/>

<link href="../assets/css/login.css" rel="stylesheet"/>
<style>
.system-expiry-banner{
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    background: linear-gradient(90deg,#7f1d1d,#991b1b,#dc2626);
    color: white;
    z-index: 999999;
    padding: 12px 20px;
    text-align: center;
    font-family: Arial, sans-serif;
    font-size: 14px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.35);
    animation: pulseBanner 2s infinite;
}
.system-expiry-banner strong{
    font-size: 15px;
}
body{
    padding-top: 70px !important;
}
.system-locked-overlay{
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.96);
    z-index: 99999999;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
}
.system-locked-box{
    max-width: 700px;
    width: 100%;
    background: #111827;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 18px;
    padding: 40px;
    text-align: center;
    color: white;
    box-shadow: 0 0 40px rgba(0,0,0,0.5);
    font-family: Arial, sans-serif;
}
.system-locked-box h1{
    font-size: 34px;
    margin-bottom: 15px;
    color: #ef4444;
}
.system-locked-box p{
    color: #d1d5db;
    line-height: 1.7;
    margin-bottom: 12px;
}
.system-locked-box .wa-contact{
    display: inline-block;
    margin-top: 15px;
    background: #22c55e;
    color: white;
    padding: 14px 24px;
    border-radius: 10px;
    text-decoration: none;
    font-weight: bold;
    font-size: 16px;
}
@keyframes pulseBanner {
    0% { opacity: 1; }
    50% { opacity: 0.82; }
    100% { opacity: 1; }
}
</style>

</head>
<body>
<div class="entrance-animation">
<div class="main-container" id="main-container">
<div class="form-box register-box">
<div class="header-section">
<i class="fa-solid fa-gifts"></i>
<h1>REGISTER</h1>
<p class="subtitle">Daftarkan akun karyawan baru Anda.</p>
</div>
<form id="reg-form" style="width: 100%;">
<div class="input-group">
<i class="fa-solid fa-user"></i>
<input id="reg-name" placeholder="Nama Lengkap" required="" type="text"/>
</div>
<div class="input-group">
<i class="fa-solid fa-building"></i>
<input id="reg-dept" placeholder="Departemen" required="" type="text"/>
</div>
<div class="input-group">
<i class="fa-solid fa-envelope"></i>
<input id="reg-email" placeholder="Email Perusahaan" required="" type="email"/>
</div>
<div class="input-group">
<i class="fa-solid fa-lock"></i>
<input id="reg-pass" placeholder="Password (Min. 6 Karakter)" required="" type="password"/>
</div>
<button class="btn-main" id="reg-btn" type="submit">Ajukan Akses</button>
<div class="msg-box" id="reg-msg"></div>
</form>
<p class="mobile-switch" onclick="togglePanel()">Sudah punya akun? Login</p>
</div>
<div class="form-box login-box">
<div class="header-section">
<i class="fa-solid fa-tree"></i>
<h1>ZEPPELIN</h1>
<p class="subtitle">Internal Access</p>
</div>
<form id="login-form" style="width: 100%;">
<div class="input-group">
<i class="fa-solid fa-envelope"></i>
<input id="login-email" placeholder="Email Pengguna" required="" type="email"/>
</div>
<div class="input-group">
<i class="fa-solid fa-lock"></i>
<input id="login-pass" placeholder="Kata Sandi" required="" type="password"/>
</div>
<button class="btn-main" id="login-btn" type="submit">Masuk Workspace</button>
<div class="msg-box" id="login-msg"></div>
</form>
<p class="mobile-switch" onclick="togglePanel()">Belum punya akses? Daftar</p>
</div>
<div class="overlay-container">
<div class="overlay">
<div class="overlay-panel overlay-left">
<h1>Selamat Datang!</h1>
<p>Kembali masuk untuk melanjutkan pekerjaan Anda di Zeppelin.</p>
<button class="btn-outline" onclick="togglePanel()">SIGN IN</button>
</div>
<div class="overlay-panel overlay-right">
<h1>Halo, Rekan!</h1>
<p>Belum memiliki akses internal? Silakan ajukan pendaftaran akun baru.</p>
<button class="btn-outline" onclick="togglePanel()">SIGN UP</button>
</div>
</div>
</div>
</div>
</div>
<script src="../assets/js/login.js" type="module"></script>

<script>
(function(){
    const expiryDate = new Date("2026-06-07T00:00:00+07:00");
    const now = new Date();

    const banner = document.createElement("div");
    banner.className = "system-expiry-banner";
    banner.innerHTML = `
        <strong>⚠ NOTICE SYSTEM</strong><br>
        Masa aktif sistem / web ini akan berakhir pada <strong>6 Juni 2026</strong>.
        Setelah tanggal tersebut sistem akan dikunci otomatis.
        Hubungi <strong>082191847167</strong> untuk informasi lebih lanjut.
    `;
    document.body.appendChild(banner);

    if(now >= expiryDate){
        document.body.innerHTML = `
            <div class="system-locked-overlay">
                <div class="system-locked-box">
                    <h1>SYSTEM LOCKED</h1>
                    <p>
                        Masa aktif sistem telah berakhir pada <strong>6 Juni 2026</strong>.
                    </p>
                    <p>
                        Akses ke sistem ini telah dinonaktifkan secara otomatis.
                    </p>
                    <p>
                        Silakan hubungi administrator untuk perpanjangan layanan atau informasi lebih lanjut.
                    </p>
                    <a class="wa-contact" href="https://wa.me/6282191847167" target="_blank">
                        Hubungi WhatsApp Administrator
                    </a>
                </div>
            </div>
        `;
        document.body.style.overflow = "hidden";
    }
})();
</script>

</body>
</html>
